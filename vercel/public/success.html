<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor — Payment Successful</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0b1120;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #131c31;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      text-align: center;
    }
    .check {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .check svg { width: 24px; height: 24px; }
    h1 { font-size: 20px; color: #f1f5f9; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; }
    #status { margin-top: 16px; font-size: 13px; }
    .success-text { color: #4ade80; }
    .error-text { color: #f87171; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note {
      font-size: 12px;
      color: #475569;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Payment Successful!</h1>
    <p>Your Valor Action Pack purchase is complete.</p>
    <div class="spinner" id="spinner"></div>
    <p id="status">Verifying and adding credits...</p>
    <p class="note">You can close this tab after credits are added.</p>
  </div>

  <script>
    (function() {
      var statusEl = document.getElementById('status');
      var spinnerEl = document.getElementById('spinner');
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      var extId = params.get('ext');

      if (!sessionId || !extId) {
        spinnerEl.style.display = 'none';
        statusEl.textContent = 'Missing session or extension info.';
        statusEl.className = 'error-text';
        return;
      }

      // Step 1: Verify the payment server-side.
      fetch('/api/verify-session?session_id=' + encodeURIComponent(sessionId))
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (!data.ok) {
            spinnerEl.style.display = 'none';
            statusEl.textContent = 'Verification failed: ' + (data.error || 'Unknown error');
            statusEl.className = 'error-text';
            return;
          }

          var credits = data.credits || 50;

          // Step 2: Send credits to the extension via external messaging.
          // Requires externally_connectable in the extension manifest.
          if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
            chrome.runtime.sendMessage(
              extId,
              { type: 'ADD_CREDITS', credits: credits, session_id: sessionId },
              function(response) {
                spinnerEl.style.display = 'none';

                if (chrome.runtime.lastError) {
                  console.log('External message error:', chrome.runtime.lastError.message);
                  statusEl.textContent = credits + ' credits verified! Reopen the extension popup to see your balance.';
                  statusEl.className = 'success-text';
                  return;
                }

                if (response && response.ok) {
                  statusEl.textContent = credits + ' credits added! New balance: ' + response.credits;
                  statusEl.className = 'success-text';
                } else {
                  statusEl.textContent = credits + ' credits verified! Reopen the extension popup to see your balance.';
                  statusEl.className = 'success-text';
                }
              }
            );
          } else {
            spinnerEl.style.display = 'none';
            statusEl.textContent = credits + ' credits verified! Reopen the extension popup to see your balance.';
            statusEl.className = 'success-text';
          }
        })
        .catch(function(err) {
          spinnerEl.style.display = 'none';
          statusEl.textContent = 'Verification error. Please contact support.';
          statusEl.className = 'error-text';
        });
    })();
  </script>
</body>
</html>
