<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor — Checkout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0b1120;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #131c31;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 20px; color: #f1f5f9; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Valor Action Pack</h1>
    <p>50 AI action credits — $1.99</p>
    <div class="spinner" id="spinner"></div>
    <p id="status">Redirecting to checkout...</p>
    <p class="error" id="error"></p>
  </div>

  <script>
    (function() {
      var status = document.getElementById('status');
      var error = document.getElementById('error');
      var spinner = document.getElementById('spinner');

      // Read the extension ID from the URL so we can pass it through to the success page.
      var params = new URLSearchParams(window.location.search);
      var ext = params.get('ext') || '';

      fetch('/api/create-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ext: ext })
      })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.url) {
            window.location.href = data.url;
          } else {
            spinner.style.display = 'none';
            status.textContent = '';
            error.style.display = 'block';
            error.textContent = 'Unable to start checkout: ' + (data.error || 'Unknown error');
          }
        })
        .catch(function(err) {
          spinner.style.display = 'none';
          status.textContent = '';
          error.style.display = 'block';
          error.textContent = 'Connection error. Please try again.';
        });
    })();
  </script>
</body>
</html>
