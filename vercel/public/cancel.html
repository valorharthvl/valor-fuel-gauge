<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor — Payment Cancelled</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0b1120;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #131c31;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 20px; color: #f1f5f9; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
    a {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    a:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment Cancelled</h1>
    <p>No charges were made. You can try again whenever you are ready.</p>
    <a href="/checkout.html">Try Again</a>
  </div>
</body>
</html>
