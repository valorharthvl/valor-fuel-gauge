<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor AI Fuel Gauge — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 32px;
      max-width: 520px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 24px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #38bdf8;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #7dd3fc; }
    #save-status {
      font-size: 13px;
      color: #4ade80;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="field">
    <label for="user-email">Email (for account lookup)</label>
    <input type="email" id="user-email" placeholder="you@example.com">
  </div>

  <button id="save-btn" type="button">Save</button>
  <p id="save-status"></p>

  <script src="storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
