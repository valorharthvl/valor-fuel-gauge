<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor AI Fuel Gauge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="header-logo">V</div>
      <h1 id="header-title">Valor AI Fuel Gauge</h1>
      <button id="settings-btn" type="button" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Claude Gauge Card -->
    <div class="gauge-card" id="claude-card">
      <div class="gauge-card-header">
        <span class="platform-dot claude-dot"></span>
        <span class="platform-name">Claude</span>
      </div>
      <div class="gauge-card-body">
        <div class="gauge-wrap">
          <svg viewBox="0 0 120 120" width="100" height="100">
            <circle cx="60" cy="60" r="50" fill="none" stroke="#1e293b" stroke-width="9"/>
            <circle class="gauge-arc" id="claude-arc" cx="60" cy="60" r="50" fill="none" stroke="#4ade80" stroke-width="9" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="gauge-label">
            <span class="gauge-pct" id="claude-pct">--</span>
            <span class="gauge-pct-sign" id="claude-pct-sign">%</span>
          </div>
        </div>
        <div class="gauge-info">
          <p class="gauge-caption" id="claude-caption">Usage remaining</p>
          <p class="gauge-reset" id="claude-reset">Resets <span id="claude-reset-val">--</span></p>
        </div>
      </div>
    </div>

    <!-- ChatGPT Gauge Card -->
    <div class="gauge-card" id="chatgpt-card">
      <div class="gauge-card-header">
        <span class="platform-dot chatgpt-dot"></span>
        <span class="platform-name">ChatGPT</span>
      </div>
      <div class="gauge-card-body">
        <div class="gauge-wrap">
          <svg viewBox="0 0 120 120" width="100" height="100">
            <circle cx="60" cy="60" r="50" fill="none" stroke="#1e293b" stroke-width="9"/>
            <circle class="gauge-arc" id="chatgpt-arc" cx="60" cy="60" r="50" fill="none" stroke="#4ade80" stroke-width="9" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="gauge-label">
            <span class="gauge-pct" id="chatgpt-pct">--</span>
            <span class="gauge-pct-sign" id="chatgpt-pct-sign">%</span>
          </div>
        </div>
        <div class="gauge-info">
          <p class="gauge-caption" id="chatgpt-caption">Usage remaining</p>
          <p class="gauge-reset" id="chatgpt-reset">Resets <span id="chatgpt-reset-val">--</span></p>
        </div>
      </div>
    </div>

    <section id="action-section">
      <button id="summarize-btn" type="button">Summarize</button>
      <p id="action-error" class="action-error"></p>
      <div id="result-box" class="result-box hidden">
        <button id="result-dismiss" class="result-dismiss" type="button" title="Dismiss">&times;</button>
        <p id="result-text"></p>
      </div>
    </section>

    <div id="divider"></div>

    <section id="credits-section">
      <div id="credits-row">
        <div id="credits-info">
          <span id="credits-label">Action Pack Credits</span>
          <span id="credits-value">--</span>
        </div>
        <button id="buy-btn" type="button">Buy More</button>
      </div>
    </section>

  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
