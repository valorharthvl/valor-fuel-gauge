<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor AI Fuel Gauge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="header-logo">C</div>
      <h1 id="header-title">Valor AI Fuel Gauge</h1>
      <button id="settings-btn" type="button" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <section id="gauge-section">
      <div id="gauge-container">
        <svg id="gauge-svg" viewBox="0 0 160 160">
          <!-- Background track -->
          <circle
            cx="80" cy="80" r="68"
            fill="none"
            stroke="#1e293b"
            stroke-width="12"
          />
          <!-- Foreground arc (drawn by JS) -->
          <circle
            id="gauge-arc"
            cx="80" cy="80" r="68"
            fill="none"
            stroke="#4ade80"
            stroke-width="12"
            stroke-linecap="round"
            transform="rotate(-90 80 80)"
          />
        </svg>
        <div id="gauge-label">
          <span id="gauge-percent">--</span>
          <span id="gauge-percent-sign">%</span>
        </div>
      </div>
      <p id="gauge-caption">Claude usage remaining</p>
      <p id="reset-date">Resets <span id="reset-date-value">--</span></p>
    </section>

    <div id="divider"></div>

    <section id="credits-section">
      <div id="credits-row">
        <div id="credits-info">
          <span id="credits-label">Action Pack Credits</span>
          <span id="credits-value">--</span>
        </div>
        <button id="buy-btn" type="button">Buy More</button>
      </div>
    </section>

  </div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
